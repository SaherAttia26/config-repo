server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        routes:

          - id: product-service

            uri: lb://PRODUCT-SERVICE

            predicates:
              - Path=/api/v1/products/**

          - id: inventory-service

            uri: lb://INVENTORY-SERVICE

            predicates:
              - Path=/api/v1/inventory/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
